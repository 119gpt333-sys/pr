<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 활용이 막막한 직장인을 위한 실무 AI 협업, 업무 자동화, 데이터 인사이트 콘텐츠와 커피챗 신청">
  <meta name="theme-color" content="#2563eb">
  <meta name="author" content="AI 실무 활용">
  <title>AI 실무 활용 | 개인 브랜딩</title>
  <link rel="stylesheet" href="style/main.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
</head>
<body>
  <header class="header" role="banner" aria-label="사이트 헤더">
    <div class="header-inner">
      <h1 class="brand">AI 실무 활용</h1>
    </div>
  </header>

  <main class="main" role="main">
    <!-- 섹션 1: 히어로 -->
    <section id="hero" class="section hero" aria-label="소개">
      <p class="hero-text">
        AI활용이 막막한 직장인에게 실무에 바로 적용 가능한 AI 협업 방법을 활용하여 업무 생산성을 극대화하고 창의적인 일에 집중하는 즐거움을 제공합니다.
      </p>
    </section>

    <!-- 섹션 2: 주제 소개 -->
    <section id="topics" class="section topics" aria-label="주제 소개">
      <h2 class="section-title">제공 주제</h2>
      <ul class="topic-list">
        <li class="topic-card animate-on-scroll">
          <span class="topic-icon topic-icon--work" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0018 8a6 6 0 00-12 0c0 1.36.45 2.62 1.22 3.6.76.9 1.24 1.67 1.41 2.5"/>
            </svg>
          </span>
          <h3 class="topic-title">AI 워크 스마트</h3>
          <p class="topic-desc">실전 AI활용법 & 성공 사례</p>
        </li>
        <li class="topic-card animate-on-scroll">
          <span class="topic-icon topic-icon--automate" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
          </span>
          <h3 class="topic-title">AI 동료 만들기</h3>
          <p class="topic-desc">NO-CODE / LOW-CODE 업무 자동화</p>
        </li>
        <li class="topic-card animate-on-scroll">
          <span class="topic-icon topic-icon--data" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </span>
          <h3 class="topic-title">AI로 데이터 인사이트 발견</h3>
          <p class="topic-desc">데이터 분석 & 시각화</p>
        </li>
      </ul>
    </section>

    <!-- 섹션 3: 커피챗 신청 (구글 폼) -->
    <section id="contact" class="section cta-section" aria-label="커피챗 신청">
      <h2 class="section-title">커피챗 신청</h2>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScFUyLipa-kSA7TRdiI6tqyX4_E6J_uBQ8Avjj7sLfBqdPjyQ/viewform?usp=publish-editor" class="cta-button" target="_blank" rel="noopener noreferrer">
        커피챗 신청하기
      </a>
      <p class="cta-note">구글 폼에서 이름, 연락처, 문의 내용을 입력해 주세요.</p>
    </section>

    <!-- 섹션 4: 푸터 -->
    <footer class="footer" role="contentinfo">
      <p class="footer-text">&copy; AI 실무 활용</p>
    </footer>
  </main>

  <script src="scripts/main.js"></script>
</body>
</html>
